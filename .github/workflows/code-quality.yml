name: Code Quality (Ruff & Black)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Caching-ul face rularea mult mai rapidă (element pro)

      - name: Install tools
        run: pip install ruff black

      - name: Check formatting with Black
        run: black --check .

      - name: Lint with Ruff
        run: ruff check .